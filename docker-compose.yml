services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fit-tracker-backend
    restart: unless-stopped
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/fit-tracker}
      DB_USERNAME: ${DB_USERNAME:-fit-tracker}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fit-tracker-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: fit-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-fit-tracker}
      POSTGRES_USER: ${DB_USERNAME:-fit-tracker}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5433:5432"
    volumes:
      - fit-tracker-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fit-tracker -d fit-tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  fit-tracker-postgres-data:
